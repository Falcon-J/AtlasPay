apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: frontend
    spec:
      containers:
      - name: api-gateway
        image: atlaspay/api-gateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: SERVER_PORT
          value: "8080"
        - name: RATE_LIMIT_REQUESTS
          value: "100000"
        - name: RATE_LIMIT_BURST
          value: "100000"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: atlaspay-config
              key: db_host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: atlaspay-secrets
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: atlaspay-secrets
              key: db_password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: atlaspay-config
              key: redis_host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: atlaspay-config
              key: redis_port
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: atlaspay-config
              key: kafka_brokers
        - name: KAFKA_ENABLED
          valueFrom:
            configMapKeyRef:
              name: atlaspay-config
              key: kafka_enabled
        - name: KAFKA_GROUP_ID
          valueFrom:
            configMapKeyRef:
              name: atlaspay-config
              key: kafka_group_id
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: atlaspay-secrets
              key: jwt_access_secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: atlaspay-secrets
              key: jwt_refresh_secret
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
